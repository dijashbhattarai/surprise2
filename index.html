<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Saniya 💌</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Lora',serif;
  background: radial-gradient(circle at top, #2a0d1c, #14070d 60%);
  color:#ffeef3;
  overflow-x:hidden;
  -webkit-tap-highlight-color: transparent;
}

/* card */
.card{
  backdrop-filter: blur(16px);
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,120,150,0.2);
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}

/* message text */
#messageBox{
  text-align: justify;
  text-justify: inter-word;
  line-height: 1.9;
  letter-spacing: 0.25px;
  word-spacing: 1px;
}

/* hearts */
.heart{
  position:fixed;
  pointer-events:none;
  animation: floatUp 4s linear forwards;
}
@keyframes floatUp{
  from{transform:translateY(0) scale(.7);opacity:1}
  to{transform:translateY(-120px) scale(1.5);opacity:0}
}

/* button */
.btn{
  background:linear-gradient(135deg,#ff4d7a,#d81b60);
  box-shadow:0 0 20px rgba(255,80,120,.5);
  transition:.25s;
}
.btn:hover{transform:scale(1.05)}
.btn:active{transform:scale(.95)}
</style>
</head>

<body class="flex items-center justify-center min-h-screen px-4 py-8">

<!-- LOCK SCREEN -->
<div id="lockScreen" class="text-center w-full max-w-sm px-4">

  <div class="text-5xl mb-4">🔐</div>

  <h2 class="text-3xl sm:text-4xl text-pink-400 mb-3 font-bold" style="font-family:'Playfair Display'">
    For My Baby
  </h2>

  <p class="text-pink-200 mb-6 text-sm sm:text-base">
    Enter the password to open the letter
    <br><span>Hint: The person who is mine💗 <span class="text-[10px] opacity-50">You</span></span>
  </p>

  <input id="passwordInput" type="password"
    placeholder="Enter password"
    class="w-full px-4 py-3 rounded-xl bg-black/30 border border-pink-500 text-center outline-none text-lg">

  <button onclick="checkPassword()"
    class="btn w-full mt-5 py-3 rounded-full text-white text-lg">
    Open 💌
  </button>

  <p id="errorMsg" class="text-red-400 mt-3 hidden">Wrong password</p>

</div>

<!-- MAIN CONTENT -->
<div id="mainContent" class="hidden text-center w-full max-w-md mx-auto px-3 sm:px-6">

<div class="text-5xl sm:text-6xl mb-4">💌</div>

<h1 class="text-3xl sm:text-5xl font-bold mb-2 text-pink-400" style="font-family:'Playfair Display'">
I'm So Sorry, Bebuuuu
</h1>

<p class="uppercase tracking-widest text-pink-300 text-xs mb-6 opacity-70">
— a letter from a stupid person —
</p>

<div class="card rounded-3xl p-5 sm:p-8 text-base sm:text-lg italic text-pink-100 min-h-[180px]" id="messageBox"></div>

<div class="mt-6 text-pink-400 italic text-sm sm:text-lg">
You mean everything to me 💗
</div>

</div>

<script>

// PASSWORD
const correctPassword = "saniya";

function checkPassword(){
  let val=document.getElementById('passwordInput').value;
  if(val===correctPassword){

    document.getElementById('lockScreen').style.display='none';
    document.getElementById('mainContent').classList.remove('hidden');

    // vibration
    if(navigator.vibrate){
      navigator.vibrate([200,100,200,100,300]);
    }

    startTyping();
  }else{
    document.getElementById('errorMsg').classList.remove('hidden');
  }
}

// MESSAGE TEXT (unchanged)
const text = `My babyyy,

I know that it was my fault not taking care of that penguin properly.
Ma last busy thiye bholi dekhi jaile ni herxu ma I promise
I feel really bad and sadddd, tei bhayera nindra nai lagena aani yei banaudai base
Timi khusi hunxou hola eekxin bhaye ni bhanera

Timi risaunu valid nai xa 
Tara na risau na la darling mero baby

Love u sooooooooooooooooooo much 
Friday bhetna aauxu hai
I am so excited to see you my babeeee
I misss u soooooo much bebu

love u loads and loads and loadss sooooo muchhhhhhhh

muwahhhhhhhhhhhhhhhhhhhhhh💗💗💗💗💗💗💗💗💗💗💗💗

I’m sorry, My Cutie Pie.
I love you. Always. 💗`;

let i=0;
function startTyping(){
  const box=document.getElementById("messageBox");
  let speed=26;

  function type(){
    if(i<text.length){
      box.innerHTML += text.charAt(i)==="\n" ? "<br>" : text.charAt(i);
      i++;
      setTimeout(type,speed);
    }
  }
  type();
}

// ❤️ HEART EFFECT (fixed double trigger)
let lastTouch = 0;

document.addEventListener("touchstart", function(e){
  lastTouch = Date.now();
  spawnHeart(e.touches[0].clientX, e.touches[0].clientY);
});

document.addEventListener("click", function(e){
  if(Date.now() - lastTouch < 500) return;
  spawnHeart(e.clientX, e.clientY);
});

function spawnHeart(x,y){
  const heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="💖";
  heart.style.left=x+"px";
  heart.style.top=y+"px";
  heart.style.fontSize=(16+Math.random()*20)+"px";
  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),4000);
}

</script>

</body>
</html>
